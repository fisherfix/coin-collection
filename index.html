      <h4 contenteditable="true">&#128220; 历史背景</h4>
      <p contenteditable="true">奥德索斯的大神(The Great God of Odessos, Megas Theos，伟大神)是古希腊殖民城Odessos(今保加利亚瓦尔纳)最重要的地方守护神之一，也是色雷斯本土宗教与希腊宗教融合的典型产物。学术界普遍认为，这并非某位奥林匹斯神，而是一位被希腊化了的色雷斯骑士神(Thracian Horseman)。奥德索斯由米利都殖民者于公元前6世纪建立，但当地居民主要仍是色雷斯人。随着希腊人与色雷斯人长期共处，双方宗教逐渐融合，形成了许多兼具希腊和本土特色的神。"大神"(Megas Theos)以这一尊称受到崇拜，反映出他在当地宗教中的至高地位。这位骑士神是整个巴尔干地区最重要的地方神之一，通常骑马巡视大地，象征守护城市、土地、狩猎、丰收和战争，也承担死者引导者与英雄祖先的角色。在大量石碑和浮雕中，他常骑马接近祭坛、猎杀野兽或接受祭祀，因此兼具保护神、英雄神和冥界神的多重属性。</p>

<script>
// ===== GitHub 閰嶇疆 =====
const GITHUB_REPO = 'fisherfix/coin-collection';
const GITHUB_BRANCH = 'master';
let githubToken = localStorage.getItem('gh_token') || '';
let autoSyncEnabled = localStorage.getItem('gh_autoSync') === 'true';
let _syncPending = false;
let _syncTimer = null;

// ===== Toast鎻愮ず =====
function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const bar = document.createElement('div');
  bar.id = 'toast';
  bar.textContent = msg;
  bar.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#d4af37;color:#1a1a2e;padding:10px 24px;border-radius:20px;font-size:0.9em;z-index:9999;opacity:1;transition:opacity 1s;';
  document.body.appendChild(bar);
  setTimeout(() => { bar.style.opacity='0'; setTimeout(()=>bar.remove(),1000); }, 2500);
}

// ===== GitHub API 閫氱敤璇锋眰 =====
async function ghApi(method, path, body) {
  const res = await fetch(`https://api.github.com${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${githubToken}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}


// ===== 閲嶇疆鏈湴缂栬緫 =====
function resetLocal() {
  if (!confirm('纭畾瑕佹竻绌烘墍鏈夋湰鍦扮紪杈戣褰曞悧?姝ゆ搷浣滀細浠?localStorage 绉婚櫎淇濆瓨鐨勫唴瀹瑰苟鍒锋柊椤甸潰,鎭㈠鍒?HTML 榛樿鐘舵€併€?)) return;
  localStorage.removeItem('coinCat_v4');
  location.reload();
}
// ===== GitHub 涓婁紶鍥剧墖 =====
async function uploadImage(file) {
  if (!githubToken) { showToast('鈿狅笍 璇峰厛璁剧疆 GitHub Token'); openGithubPanel(); return; }
  showToast('馃摛 姝ｅ湪涓婁紶鍥剧墖鍒?GitHub...');
  try {
    const content = await file.arrayBuffer();
    let sha;
    try {
      const existing = await ghApi('GET', `/repos/${GITHUB_REPO}/contents/images/${file.name}?ref=${GITHUB_BRANCH}`);
      sha = existing.sha;
    } catch(e) { /* 鏂版枃浠?*/ }
    const putBody = { message: `Upload ${file.name}`, content, branch: GITHUB_BRANCH };
    if (sha) putBody.sha = sha;
    await ghApi('PUT', `/repos/${GITHUB_REPO}/contents/images/${file.name}`, putBody);
    showToast(`鉁?${file.name} 宸蹭笂浼燻);
  } catch(e) { showToast('鉂?涓婁紶澶辫触: ' + e.message); }
}

// ===== 鍚屾 catalog.csv 鍒?GitHub =====
async function syncToGithub() {
  if (!githubToken) { showToast('鈿狅笍 璇峰厛璁剧疆 GitHub Token'); openGithubPanel(); return; }
  showToast('馃攧 姝ｅ湪鍚屾瀹屾暣椤甸潰...');
  try {
    // 鍏嬮殕瀹屾暣 HTML,娓呯悊鏁忔劅/涓存椂鍐呭
    const doc = document.documentElement.cloneNode(true);

    // 绉婚櫎 token 闈㈡澘
    const tk = doc.querySelector('#gh-panel');
    if (tk) tk.remove();

    // 绉婚櫎鍔熻兘鎬ф寜閽?杩欎簺鍙湪娴忚鍣ㄩ噷鏈夋晥)
    const removeBtnTexts = ['鎭㈠鏈湴缂栬緫', '閲嶇疆鏈湴', 'GitHub 鍚屾', '鍚屾鍒?GitHub'];
    doc.querySelectorAll('.tool-btn').forEach(btn => {
      if (removeBtnTexts.some(t => btn.textContent.includes(t))) btn.remove();
    });

    // 娓呯悊 onclick 灞炴€?閬垮厤娈嬬暀)
    doc.querySelectorAll('[onclick]').forEach(el => {
      const fn = el.getAttribute('onclick');
      if (fn && (fn.includes('syncToGithub') || fn.includes('openGithubPanel') || fn.includes('resetLocal') || fn.includes('restoreLocal') || fn.includes('uploadImage') || fn.includes('editImgPath') || fn.includes('triggerUpload'))) {
        el.removeAttribute('onclick');
      }
    });

    // 绉婚櫎 contenteditable(涓嬭浇鍚庝笉鍐嶅彲缂栬緫)
    doc.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));

    // 娉ㄥ叆鍚屾鏍囪
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const head = doc.querySelector('head');
    if (head) {
      const meta = doc.createElement('meta');
      meta.name = 'sync-ts';
      meta.content = ts;
      head.appendChild(meta);
    }

    const htmlContent = '<!DOCTYPE html>\n' + doc.outerHTML;
    let sha;
    try {
      const existing = await ghApi('GET', `/repos/${GITHUB_REPO}/contents/index.html?ref=${GITHUB_BRANCH}`);
      sha = existing.sha;
    } catch(e) { /* 鏂板缓 */ }
    const commitMsg = `Sync full HTML snapshot ${ts}`;
    const putBody = { message: commitMsg, content: btoa(unescape(encodeURIComponent(htmlContent))), branch: GITHUB_BRANCH };
    if (sha) putBody.sha = sha;
    await ghApi('PUT', `/repos/${GITHUB_REPO}/contents/index.html`, putBody);
    showToast('鉁?瀹屾暣椤甸潰宸插悓姝ュ埌 GitHub!');
  } catch(e) { showToast('鉂?鍚屾澶辫触: ' + e.message); }
}

    <input id="gh-token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="${githubToken}"
      style="width:100%;padding:10px;border:1px solid #555;background:#1a1a2e;color:#eee;border-radius:8px;margin-bottom:12px;font-size:0.9em;">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:15px;cursor:pointer;">
      <input id="gh-auto-sync" type="checkbox" ${autoSyncEnabled?'checked':''} style="width:18px;height:18px;accent-color:#d4af37;">
      <span style="color:#ccc;font-size:0.9em;">鈽戯笍 缂栬緫鍚庤嚜鍔ㄥ悓姝?姣?绉掓棤鎿嶄綔鑷姩鎺ㄩ€?</span>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="this.closest('#gh-panel').remove()" style="padding:8px 16px;background:#333;color:#888;border:1px solid #555;border-radius:6px;cursor:pointer;">鍙栨秷</button>

function attachImageHandlers() {

function attachCard(card) {
  const img = card.querySelector('.coin-image img');
  const placeholder = card.querySelector('.placeholder');
  if (!img) return;
  img.addEventListener('error', () => { img.style.display='none'; if(placeholder) placeholder.style.display='flex'; });
  img.addEventListener('load', () => { img.style.display='block'; if(placeholder) placeholder.style.display='none'; });
  if (img.complete && img.naturalWidth === 0) { img.style.display='none'; if(placeholder) placeholder.style.display='flex'; }
  else if (img.complete) { if(placeholder) placeholder.style.display='none'; }
  // MutationObserver 鐩戝惉鍗＄墖鍐呮墍鏈夌紪杈戝彉鍖?瀹炴椂瑙﹀彂鑷姩淇濆瓨
  const obs = new MutationObserver(() => autoSave());
  obs.observe(card, { subtree: true, childList: true, characterData: true });
}
function triggerUpload(btn) {
  const card = btn.closest('.coin-card');
  const coinId = card.querySelector('.coin-number')?.textContent?.trim() || 'coin';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop();
    const newName = `${coinId}.${ext}`;
    const renamed = new File([file], newName, { type: file.type });
    // 鏈湴棰勮
    const reader = new FileReader();
    reader.onload = ev => {
      const img = card.querySelector('.coin-image img');
      const placeholder = card.querySelector('.placeholder');
      img.src = ev.target.result;
      img.style.display = 'block';
      if (placeholder) placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
    // 鍚屾鍒?GitHub
    if (githubToken) await uploadImage(renamed);
    else showToast('馃摲 鍥剧墖宸查瑙?璁剧疆 Token 鍙嚜鍔ㄤ笂浼?');
  };
  fileInput.click();
}

// ===== 姹囩巼閰嶇疆 =====
const EXCHANGE_RATES = {
  'CNY': 1,      // 浜烘皯甯佸熀鍑?  'EUR': 7.8,    // 娆у厓 鈫?浜烘皯甯?  'GBP': 9.2,    // 鑻遍晳 鈫?浜烘皯甯?  'USD': 7.2,    // 缇庡厓 鈫?浜烘皯甯?  'US$': 7.2,    // 缇庡厓 鈫?浜烘皯甯?};

function parsePrice(priceText) {
  // 鍖归厤甯佺鍓嶇紑鍜岄噾棰?  const patterns = [
    { regex: /^楼 ?([\d,]+\.?\d*)/, currency: 'CNY' },
    { regex: /^鈧??([\d,]+\.?\d*)/, currency: 'EUR' },
    { regex: /^拢 ?([\d,]+\.?\d*)/, currency: 'GBP' },
    { regex: /^US\$ ?([\d,]+\.?\d*)/, currency: 'USD' },
    { regex: /^\$ ?([\d,]+\.?\d*)/, currency: 'USD' },
  ];

  for (const p of patterns) {
    const match = priceText.match(p.regex);
    if (match) {
      const amount = parseFloat(match[1].replace(/,/g, ''));
      if (!isNaN(amount) && amount > 0 && amount < 100000) {
        return { amount, currency: p.currency };
      }
    }
  }
  return null;
}

function recalcStats() {
  const cards = document.querySelectorAll('.coin-card');
  const coinCount = cards.length;
  let totalCNY = 0;
  const cats = new Set();
  const currencyBreakdown = {};

  cards.forEach(c => {
    if (c.dataset.category) cats.add(c.dataset.category);
    const priceText = c.querySelector('.price-value')?.textContent || '';
    const price = parsePrice(priceText);
    if (price) {
      const rate = EXCHANGE_RATES[price.currency] || 1;
      const cnyValue = price.amount * rate;
      totalCNY += cnyValue;
      // 绱姞鍚勫竵绉嶅師濮嬮噾棰?      if (!currencyBreakdown[price.currency]) currencyBreakdown[price.currency] = 0;
      currencyBreakdown[price.currency] += price.amount;
    }
  });

  const countEl = document.querySelector('.stat-count .stat-value');
  const totalEl = document.querySelector('.stat-total .stat-value');
  const catsEl = document.querySelector('.stat-cats .stat-value');
  if (countEl) countEl.textContent = coinCount;
  if (totalEl) totalEl.textContent = '楼' + Math.round(totalCNY).toLocaleString('zh-CN');
  if (catsEl) catsEl.textContent = cats.size;
}
recalcStats();

function restoreLocal() {

    d.cards.forEach(html => {
      const p = document.createElement('div');
      p.innerHTML = html;
      const sc = p.querySelector('.coin-card');
      if (!sc) return;
      // 闃插尽:鍗曟潯璁板綍鍚涓竵鍙?= 鎹熷潖鏁版嵁(濡傛棫鐗堟妸澶氬崱瀛樻垚涓€涓?,璺宠繃浠ュ厤姹℃煋鐜版湁鍗＄墖

      const num = sc.querySelector('.coin-number')?.textContent?.trim();
      const ex = [...g.querySelectorAll('.coin-card')].find(c => c.querySelector('.coin-number')?.textContent?.trim() === num);
      if (!ex) return;
      const si = sc.querySelector('.coin-image img');
      if (si) {
        const di = ex.querySelector('.coin-image img');
        if (di && si.src) { di.src = si.src; di.setAttribute('data-path', si.getAttribute('data-path')||''); }
      }
      // 鎸?className+tagName 鍒嗙粍,鎸夌储寮曞尮閰?淇 find() 鎬绘槸鍖归厤绗竴涓殑 bug)
      const sGroups = {}, dGroups = {};
      sc.querySelectorAll('[contenteditable]').forEach((el, i) => {
        const k = el.className + '|' + el.tagName;
        if (!sGroups[k]) sGroups[k] = [];
        sGroups[k].push(i);
      });
      ex.querySelectorAll('[contenteditable]').forEach((el, i) => {
        const k = el.className + '|' + el.tagName;
        if (!dGroups[k]) dGroups[k] = [];
        dGroups[k].push(el);
      });
      Object.keys(sGroups).forEach(k => {
        sGroups[k].forEach((si, idx) => {
          if (dGroups[k] && dGroups[k][idx]) {
            dGroups[k][idx].textContent = sc.querySelectorAll('[contenteditable]')[si].textContent;
          }
        });
      });
    });
    const idxMap = {};
    d.cards.forEach((html, idx) => { const m=html.match(/<span class="coin-number"[^>]*>([^<]+)<\/span>/); if(m) idxMap[m[1].trim()]=idx; });
    const ordered = [...g.querySelectorAll('.coin-card')].sort((a,b) => (idxMap[a.querySelector('.coin-number')?.textContent?.trim()||'']??999)-(idxMap[b.querySelector('.coin-number')?.textContent?.trim()||'']??999));
    ordered.forEach(c => g.appendChild(c));
    attachImageHandlers();
    showToast('鈫╋笍 宸叉仮澶嶆湰鍦扮紪杈?);
  } catch(e) { showToast('鉂?鎭㈠澶辫触'); }
}

function exportCSV() {

  const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8'});

}
